<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}}</title>
  <meta name="description" content="{{description}}" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      color: #1a1a2e;
      background: #fafafa;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    h2 { font-size: 1.8rem; margin-top: 2rem; margin-bottom: 0.5rem; }
    h3 { font-size: 1.3rem; margin-top: 1.5rem; margin-bottom: 0.5rem; }
    p { margin-bottom: 1rem; }
    a { color: #4361ee; text-decoration: none; }
    a:hover { text-decoration: underline; }
    ul, ol { margin: 0 0 1rem 1.5rem; }
    li { margin-bottom: 0.3rem; }
    blockquote {
      border-left: 4px solid #4361ee;
      padding: 0.5rem 1rem;
      margin: 1rem 0;
      background: #f0f0ff;
    }
    code { background: #eee; padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.9em; }
    pre { background: #1a1a2e; color: #e0e0e0; padding: 1rem; border-radius: 6px; overflow-x: auto; margin: 1rem 0; }
    pre code { background: none; padding: 0; color: inherit; }
    hr { border: none; border-top: 1px solid #ddd; margin: 2rem 0; }
    img { max-width: 100%; height: auto; border-radius: 6px; }
    .hero { text-align: center; padding: 3rem 0; }
    .cta {
      display: inline-block;
      background: #4361ee;
      color: #fff;
      padding: 0.75rem 2rem;
      border-radius: 6px;
      font-weight: 600;
      margin-top: 1rem;
    }
    .cta:hover { background: #3a56d4; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    {{body}}
  </div>
</body>
</html>
